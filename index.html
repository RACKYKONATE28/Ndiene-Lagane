<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Citoyen - Ndiene Lagane</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
        :root { 
            --primary: #0052cc; --primary-light: #e6f0ff; --success: #10b981; 
            --warning: #f59e0b; --danger: #ef4444; --dark: #0f172a; 
            --light: #f8fafc; --border: #e2e8f0; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--dark); background: #f1f5f9; line-height: 1.6; }
        .alert-banner { background: linear-gradient(135deg, var(--danger), #b91c1c); color: white; padding: 1rem; text-align: center; font-weight: 600; }
        header { background: linear-gradient(rgba(0, 40, 120, 0.85), rgba(0, 82, 204, 0.95)), url('https://images.unsplash.com/photo-1577083552431-6e5fd01aa342?auto=format&fit=crop&w=1200&q=80') no-repeat center/cover; color: white; padding: 4.5rem 1rem; text-align: center; }
        .logo-area { font-size: 3.5rem; margin-bottom: 0.5rem; }
        header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        container { max-width: 1200px; margin: 3rem auto; padding: 0 1.5rem; display: grid; gap: 2.5rem; }
        section { background: white; padding: 2.5rem; border-radius: 16px; border: 1px solid var(--border); }
        .card { background: var(--light); padding: 1.75rem; border-radius: 12px; border-top: 4px solid var(--primary); }
        .btn { padding: 0.85rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-whatsapp { background: #25D366; color: white; }
    </style>
</head>
<body>
    <div class="alert-banner">
        <i class="fas fa-exclamation-triangle"></i> <span id="texte-alerte">Bienvenue sur le portail</span>
    </div>

    <header>
        <div class="logo-area"><i class="fas fa-landmark"></i></div>
        <h1>Portail Citoyen de Ndiene Lagane</h1>
        <p>Votre mairie à portée de clic — Simple, Direct & Transparent</p>
    </header>

    <container>
        <section>
            <h2><i class="fas fa-users"></i> Espace Public</h2>
            <div class="card"><h3>Vie Municipale</h3><p>Informations disponibles ici.</p></div>
        </section>
        
        <section>
            <h2><i class="fas fa-comments"></i> Dialogue</h2>
            <a href="https://wa.me/221771234567" class="btn btn-whatsapp">Signaler par WhatsApp</a>
        </section>
    </container>
</body>
</html>
