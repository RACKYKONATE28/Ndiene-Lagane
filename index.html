<!DOCTYPE html>

        .card { background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; border-left: 5px solid var(--primary); }
        .btn { display: block; background: #25D366; color: white; text-align: center; padding: 1rem; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
