<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Portail citoyen officiel de la commune de Ndiene Lagane.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Citoyen - Ndiene Lagane</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --danger: #ef4444; --light: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; }
        .alert-banner { background: #ef4444; color: white; padding: 1rem; text-align: center; }
        header { background: linear-gradient(rgba(0,40,120,0.9), rgba(0,82,204,0.95)); color: white; padding: 3rem 1rem; text-align: center; }
        .photo-maire img { width: 140px; height: 140px; border-radius: 50%; border: 4px solid white; object-fit: cover; }
        .container { max-width: 900px; margin: 2rem auto; padding: 1rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>
    <div class="alert-banner">Pas d'urgence pour le moment</div>
    <header>
        <div class="photo-maire"><img src="PHOTO DE THILASS.jpg" alt="Maire"></div>
        <h1>Portail Citoyen de Ndiene Lagane</h1>
    </header>
    <div class="container">
        <section class="card"><h3>Vie Municipale</h3><p>À venir</p></section>
        <section class="card"><h3>Agenda</h3><p>À venir</p></section>
    </div>
</body>
</html>
